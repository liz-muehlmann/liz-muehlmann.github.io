---
layout: default
title: Notes
headname: Notes <h4> Click on the links to read the latest updates</h4>
---
<div class="row justify-content-center content-column-text notes-content">
  <div class="col-8">
    <ul>
      {% for post in site.posts %}
        <li>
          <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
          <hr class = "h-line">
          {{ post.excerpt }}
        </li>
      {% endfor %}
    </ul>
  </div>
</div>
