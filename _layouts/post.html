---
layout: default
headname: Notes
tag: welcome
---
<div class = "container notes-content">
  <div class="row justify-content-center content-column-text">
    <div class="col-8">
      <h1>{{ page.title }}</h1>
      <hr class = "h-line">

      {{ content }}

    <div class = "float-right">
      <p>{{ page.date | date_to_string }} - {{ page.author }} </p>
    </div>

    <div class = "row float-left">
      <a href = "/notes.html"><button type="button" class="btn btn-outline-secondary">Back to all posts</button></a>
    </div>
  </div>
</div>
